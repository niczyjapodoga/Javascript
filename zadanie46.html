<html>
<head>
<meta charset="UTF-8">
</head>

<body>

<div style="font-size:42px;">

<script language="JavaScript">

var liczba = prompt("Podaj liczbę:");

for(i=1;i<=11;i++)
{
    if(liczba % 2 == 0)
    {
        document.write("<span style='color:blue;'>Lybacki<br></span>");
    }
    else
    {
        document.write("<span style='color:green;'>Stanislaw<br></span>");
    }
}

</script>

</div>

</body>
</html>
