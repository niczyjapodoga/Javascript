<!DOCTYPE html>
<html>
<body>
<div style="color:red;font-size:50px;">
<script>
var x=prompt("podaj liczbę x=","");
var a=parseFloat(x);
document.write("Wczytana liczba = "+a+"<br>");
if(a>0){
document.write("Liczba jest większa od 0");
}
else if(a==0){
document.write("Liczba jest równa 0");
}
else{
document.write("Liczba jest mniejsza od 0");
}
</script>
</div>
</body>
</html>
